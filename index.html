<!DOCTYPE html>

<html lang=en>

  <head>
    <title>Tip Calculator</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./favicon.ico" rel="shortcut icon">
    <link href="./style.css" rel="stylesheet">
  </head>

  <center>

    <body>
     <p id="text2" class="idk">TIP CALCULATOR<p>
     <div id="input-answer" class="idk">
      <div class="form">
        <form id="form1">
         <section id="inputs">
          <label for="billInput">Input your bill: £</label>
          <input type="number" name="billInput" id="billInput">
             <br>
           <label for="percentageInput">Input your tip: &nbsp;%</label>
           <input type="number" name="percentageInput" id="percentageInput">
          </section>
             <br>
           <button type="Submit" id="savebtn" onclick="calculateTip()">Submit</button>
           <button type="reset" id="clearbtn">Clear</button>
         </form>

       </div>

       <br>
   
       <div id="result">
        <form id="form2">
         <table>
           <tr>
             <td id="answer1">Tip amount:</td>
             <td id="tipValue">0.00</td>
           </tr>
           <tr>
             <td id="answer2">Total bill:</td>
             <td id="totalBill">0.00</td>
           </tr>
         </table>
        </form>
       </div>
      </div>
     <script src="script.js" type="text/javascript"></script>
   </body>
 </center>
</html>
